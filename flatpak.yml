id: org.signal.Signal
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
command: signal-desktop
separate-locales: false
rename-desktop-file: signal-desktop.desktop
rename-icon: signal-desktop
build-options:
  env:
    XDG_CACHE_HOME: /run/build/signal-desktop/flatpak-node/cache
    npm_config_cache: /run/build/signal-desktop/flatpak-node/npm-cache
    npm_config_nodedir: /usr/lib/sdk/node20
    npm_config_offline: 'true'
finish-args:
  # X11 performance
  - --share=ipc
  # We need X11
  - --socket=x11
  # Access to wayland
  - --socket=wayland
  # Audio Access
  - --socket=pulseaudio
  # All devices (camera, video for calls)
  - --device=all
  # Network Access
  - --share=network
  # We need to be able to inhibit sleep
  - --system-talk-name=org.freedesktop.login1
  - --talk-name=org.gnome.SessionManager
  - --talk-name=org.freedesktop.PowerManagement
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.gnome.Mutter.IdleMonitor
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=com.canonical.indicator.application
  - --talk-name=org.ayatana.indicator.application
  # Allow advanced input methods
  - --talk-name=org.freedesktop.portal.Fcitx
  - --env=SIGNAL_USE_TRAY_ICON=0
  - --env=SIGNAL_USE_WAYLAND=0
  - --env=SIGNAL_DISABLE_GPU=0
  - --env=SIGNAL_DISABLE_GPU_SANDBOX=0
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons

modules:
  - name: signal-desktop
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node20/bin
      arch:
        x86_64:
          env:
            ARCHSPECIFICVARIABLESHORT: x64
        aarch64:
          env:
            ARCHSPECIFICVARIABLESHORT: arm64
    build-commands:
      - git-lfs install
      - git config --global user.name name
      - git config --global user.email name@example.com
      - |
        npm config set cache ${npm_config_cache}
        npm config set offline true
      - |
        sed -i -e 's/"node": "20.*"/"node": "20"/' package.json
      - sed -r '/mock/d' -i package.json
      - sed -r 's#("better-sqlite3": ").*"#\1file:../better-sqlite3"#' -i package.json
      - rm -rf ts/test-mock
      - |
        npm install --offline
        ls -al /run/build/signal-desktop/flatpak-node/npm-cache
        find /run/build/signal-desktop/flatpak-node/ -type d -name 'better-sqlite3'
        ls -al /run/build/signal-desktop/flatpak-node/cache
        ls -al node_modules
        ls -al node_modules/@signalapp
        ls -al node_modules/@signalapp/better-sqlite3
      - npm run generate
      - npm run build:release --$ARCHSPECIFICVARIABLESHORT --linux --dir
      - npm run build:release --$ARCHSPECIFICVARIABLESHORT --linux --deb
      - mv release/linux-unpacked release/signal
      - ls -al release/
      - cp release/signal-desktop_*.deb signal-desktop.deb
      - install -Dm0755 signal-desktop.sh "${FLATPAK_DEST}/bin/signal-desktop"
      - install -Dm0644 "${FLATPAK_ID}.metainfo.xml" "${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml"
      - |
        bsdtar -Oxf signal-desktop.deb 'data.tar.xz' |
          bsdtar -xf - \
            --exclude='./usr/share/doc'
      - mv opt/* "${FLATPAK_DEST}"
      - install -Dm0644 "usr/share/applications/signal-desktop.desktop" "${FLATPAK_DEST}/share/applications/signal-desktop.desktop"
      - desktop-file-edit --set-key=Exec --set-value='signal-desktop %U' "${FLATPAK_DEST}/share/applications/signal-desktop.desktop"
      - |
        for size in 16 24 32 48 64 128 256 512; do
          install -Dm0644 "usr/share/icons/hicolor/${size}x${size}/apps/signal-desktop.png" "${FLATPAK_DEST}/share/icons/hicolor/${size}x${size}/apps/signal-desktop.png"
        done
      - desktop-file-edit --set-key=Icon --set-value="signal-desktop" "${FLATPAK_DEST}/share/applications/signal-desktop.desktop"
      - desktop-file-edit --set-key=X-Purism-FormFactor --set-value="Workstation;Mobile;" "${FLATPAK_DEST}/share/applications/signal-desktop.desktop"
    sources:
      - generated-sources.json
      - type: git
        url: https://github.com/signalapp/Signal-Desktop.git
        tag: 7.29.x
      # url from https://github.com/signalapp/better-sqlite3/blob/v8.8.1/deps/download.js, branch from https://github.com/signalapp/Signal-Desktop/blob/7.29.x/package.json
      - type: archive
        url: https://build-artifacts.signal.org/desktop/sqlcipher-4.6.1--3.0.7--0.2.1-7c30de8bcb5d21127803f5ab19a097e1b508d05744aca3ac6166352506b5f451.tar.gz
        sha256: 7c30de8bcb5d21127803f5ab19a097e1b508d05744aca3ac6166352506b5f451
        dest-filename: sqlcipher.tar.gz
      # - type: git
      #   url: https://github.com/signalapp/better-sqlite3.git
      #   tag: v8.8.5
      #   commit: 1931cc95f2c379fc34cfaab97c3c17f334cce63c
      - type: file
        path: signal-desktop.sh
      - type: file
        path: org.signal.Signal.metainfo.xml
