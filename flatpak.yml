id: org.signal.Signal.adhoc20250124197660a96
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: signal-desktop
separate-locales: false
rename-icon: signal-desktop
finish-args:
  # X11 performance
  - --share=ipc
  # We need X11
  - --socket=x11
  # Access to wayland
  - --socket=wayland
  # Audio Access
  - --socket=pulseaudio
  # All devices (camera, video for calls)
  - --device=all
  # Network Access
  - --share=network
  # We need to be able to inhibit sleep
  - --system-talk-name=org.freedesktop.login1
  - --talk-name=org.gnome.SessionManager
  - --talk-name=org.freedesktop.PowerManagement
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.gnome.Mutter.IdleMonitor
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=com.canonical.indicator.application
  - --talk-name=org.ayatana.indicator.application
  # Allow advanced input methods
  - --talk-name=org.freedesktop.portal.Fcitx
  - --env=SIGNAL_USE_TRAY_ICON=0
  - --env=SIGNAL_USE_WAYLAND=0
  - --env=SIGNAL_DISABLE_GPU=0
  - --env=SIGNAL_DISABLE_GPU_SANDBOX=0
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons

modules:
  - name: signal-desktop
    buildsystem: simple
    build-options:
      arch:
        x86_64:
          env:
            ARCHSPECIFICVARIABLESHORT: x64
        aarch64:
          env:
            ARCHSPECIFICVARIABLESHORT: arm64
    build-commands:
      - install -Dm0755 signal-desktop.sh "${FLATPAK_DEST}/bin/signal-desktop"
      - install -Dm0644 "org.signal.Signal.metainfo.xml" "${FLATPAK_DEST}/share/metainfo/org.signal.Signal.metainfo.xml"
      - install -Dm0644 "org.signal.Signal.desktop" "${FLATPAK_DEST}/share/applications/org.signal.Signal.adhoc20250124197660a96.desktop"
      - |
        bsdtar -Oxf signal-desktop.deb 'data.tar.xz' |
          bsdtar -xf - \
            --exclude='./usr/share/doc'
      - mv "opt/Signal Adhoc 20250124.197660a96" "${FLATPAK_DEST}/Signal"
      - |
        for size in 16 24 32 48 64 128 256 512; do
          install -Dm0644 "usr/share/icons/hicolor/${size}x${size}/apps/signal-desktop-adhoc-20250124-197660a96.png" "${FLATPAK_DEST}/share/icons/hicolor/${size}x${size}/apps/signal-desktop.png"
        done
    sources:
      - type: file
        dest-filename: signal-desktop.deb
        url: https://updates.signal.org/desktop/apt-adhoc/pool/s/signal-desktop-adhoc-20250124-197660a96/signal-desktop-adhoc-20250124-197660a96_7.42.0-adhoc.20250124.14-197660a96_amd64.deb
        sha256: 836d3a7987a849504fc1c4fd566ed4011063d77a656712f175089714c15be6d4
        only-arches:
          - x86_64
      - type: file
        path: signal-desktop.sh
      - type: file
        path: org.signal.Signal.metainfo.xml
      - type: file
        path: org.signal.Signal.desktop
